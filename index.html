<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />

    <!-- viewport-fit=cover lets our layout extend under the iPhone notch / home bar -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Browser UI color (Android address bar, etc.) -->
    <meta name="theme-color" content="#0b1020" />

    <!-- iPhone "Add to Home Screen" support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SimplyVoxel" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Roboto Flex: a variable font with weight (wght) + optical-size (opsz)
         axes, needed for the VariableProximity hover/drag effect. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap"
      rel="stylesheet"
    />

    <title>SimplyVoxel</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
