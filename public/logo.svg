  <polygon points="136,190 136,322 256,382 256,250" fill="#38bdf8" stroke="#0b1020" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="376,190 376,322 256,382 256,250" fill="#0e7fb8" stroke="#0b1020" stroke-width="3" stroke-linejoin="round"/>
</svg>
